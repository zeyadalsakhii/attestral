# Triggers ATL-527: mounts a gitRepo volume, the deprecated in-tree volume type
# behind CVE-2024-10220 (arbitrary command execution on the node via crafted
# git hooks/submodules) and CVE-2025-1767.
apiVersion: v1
kind: Pod
metadata:
  name: gitrepo-clone
  namespace: agents
spec:
  containers:
    - name: app
      image: registry.example.com/app@sha256:bbbb
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        seccompProfile: { type: RuntimeDefault }
        capabilities: { drop: ["ALL"] }
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits: { cpu: "250m", memory: "256Mi" }
      livenessProbe:
        httpGet: { path: /healthz, port: 8080 }
      volumeMounts:
        - name: src
          mountPath: /src
  volumes:
    - name: src
      gitRepo:
        repository: "https://github.com/example/config.git"
        revision: "main"
