# Triggers ATL-528: mounts a flexVolume, the deprecated out-of-tree driver
# volume whose driver binary runs on the node from the kubelet plugin dir.
apiVersion: v1
kind: Pod
metadata:
  name: flexvol-consumer
  namespace: agents
spec:
  containers:
    - name: app
      image: registry.example.com/app@sha256:cccc
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        seccompProfile: { type: RuntimeDefault }
        capabilities: { drop: ["ALL"] }
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits: { cpu: "250m", memory: "256Mi" }
      livenessProbe:
        httpGet: { path: /healthz, port: 8080 }
      volumeMounts:
        - name: legacy
          mountPath: /data
  volumes:
    - name: legacy
      flexVolume:
        driver: "vendor/legacy-driver"
        options: { size: "10g" }
