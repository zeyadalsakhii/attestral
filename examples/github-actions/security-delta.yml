# Post an Attestral security-impact delta on every PR that touches an agent
# design. Builds the system model on the PR's base and head, diffs them, and
# writes ONE comment (updated in place on later pushes) describing what the
# change made worse: capabilities gained, attack paths opened or closed, new
# findings, and the shift in worst-case blast radius.
name: attestral-security-delta
on:
  pull_request:
    paths:
      - "**/*.mcp.json"
      - "**/mcp*.json"
      - "**/.claude/**"
      - "**/*.tf"
      - "**/*.yaml"
      - "**/*.yml"

permissions:
  contents: read
  pull-requests: write        # required to post the review comment

jobs:
  security-delta:
    runs-on: ubuntu-latest
    steps:
      - name: Check out head revision
        uses: actions/checkout@v5
        with:
          path: head
      - name: Check out base revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "attestral[terraform]"

      - name: Diff base vs head → delta.md
        run: attestral diff base head -o delta.md

      - name: Post or update the PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- attestral-security-delta -->';
            const body = marker + '\n' + fs.readFileSync('delta.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number });
            const mine = comments.find(c => c.body && c.body.includes(marker));
            if (mine) {
              await github.rest.issues.updateComment(
                { owner, repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner, repo, issue_number, body });
            }
