# Attestral core rule pack (v0)
# Deterministic, design-level checks. Each rule targets a component type
# and applies structured matchers against ingested attributes.
rules:
  - id: ATL-001
    title: S3 bucket allows public access
    severity: critical
    target: aws_s3_bucket
    match: { attr_in: { acl: ["public-read", "public-read-write"] } }
    description: Bucket ACL grants access to all users, exposing stored data to the internet.
    recommendation: Remove the public ACL and enforce account-level S3 Block Public Access.
    frameworks: ["NIST AC-3", "ASVS V4.1", "SOC2 CC6.1"]

  - id: ATL-002
    title: Security group open to the world
    severity: high
    target: aws_security_group
    match: { attr_list_contains: { _ingress_cidr_blocks: "0.0.0.0/0" } }
    description: Ingress permits traffic from any IPv4 address, expanding the attack surface to the entire internet.
    recommendation: Restrict ingress CIDRs to known ranges or place the service behind a load balancer/VPN.
    frameworks: ["NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-003
    title: IAM policy grants wildcard actions
    severity: critical
    target: aws_iam_policy
    match: { attr_contains: { policy: '"Action": "*"' } }
    description: Wildcard IAM actions violate least privilege; a compromised principal gains full account control.
    recommendation: Enumerate required actions explicitly; use IAM Access Analyzer to right-size.
    frameworks: ["NIST AC-6", "ASVS V4.1", "SOC2 CC6.3"]

  - id: ATL-004
    title: Database publicly accessible
    severity: critical
    target: aws_db_instance
    match: { attr_equals: { publicly_accessible: true } }
    description: The database endpoint is reachable from the public internet.
    recommendation: Set publicly_accessible = false and access the DB through private subnets or a bastion.
    frameworks: ["NIST SC-7", "SOC2 CC6.1"]

  - id: ATL-005
    title: Storage encryption not declared
    severity: medium
    target: aws_db_instance
    match: { attr_missing: storage_encrypted }
    description: Encryption at rest is not declared in the design; data may be stored in plaintext.
    recommendation: Set storage_encrypted = true (and kms_key_id for CMK control).
    frameworks: ["NIST SC-28", "ASVS V6.1", "SOC2 CC6.7"]

  - id: ATL-101
    title: MCP server uses non-TLS transport
    severity: high
    target: mcp_server
    match: { attr_starts_with: { url: "http://" } }
    description: Tool traffic (including prompts and tool results) crosses the network unencrypted.
    recommendation: Serve the MCP endpoint over HTTPS/WSS only.
    frameworks: ["NIST SC-8", "OWASP-ASI03:2026", "OWASP-MCP MCP07:2025", "NSA CSI MCP 05/2026"]

  - id: ATL-102
    title: Filesystem MCP server rooted at a broad path
    severity: high
    target: mcp_server
    match: { attr_list_any_of: { args: ["/", "~", "/home", "/Users"] } }
    description: The agent gains read/write reach over a broad filesystem root, far beyond task scope.
    recommendation: Scope the server to the narrowest project directory that supports the workflow.
    frameworks: ["NIST AC-6", "OWASP-ASI02:2026", "OWASP-MCP MCP02:2025"]

  - id: ATL-103
    title: Shell-capable MCP server configured
    severity: critical
    target: mcp_server
    match: { attr_any_contains: { command: ["bash", "sh", "cmd", "powershell"], args: ["bash", "sh -c", "shell"] } }
    description: The agent can execute arbitrary shell commands; a single prompt injection becomes code execution.
    recommendation: Replace generic shell access with narrowly scoped, allowlisted tools; gate with human approval.
    frameworks: ["OWASP-ASI05:2026", "OWASP-MCP MCP05:2025", "NIST AC-6"]
  - id: ATL-146
    title: Shell execution hidden inside interpreter inline code
    severity: critical
    target: mcp_server
    match: { attr_equals: { _shell_via_interpreter: true } }
    description: The launch runs an interpreter (node, python, ruby, ...) with inline code that spawns a process (child_process, os.system, subprocess, backticks). This is a shell capability that declares no shell token, so a plain command check misses it while the risk is identical to ATL-103 - one prompt injection becomes code execution.
    recommendation: Do not smuggle shell access through an interpreter one-liner. Replace it with a narrowly scoped, allowlisted tool, and gate any process execution behind human approval.
    frameworks: ["OWASP-ASI05:2026", "OWASP-MCP MCP05:2025", "MITRE ATLAS AML.T0053", "NIST AC-6"]

  - id: ATL-147
    title: MCP server binds to all network interfaces (0.0.0.0)
    severity: high
    target: mcp_server
    match: { attr_any_contains: { args: ["0.0.0.0"] } }
    description: The launch binds the server to 0.0.0.0, so its tool endpoint is reachable from every network the host sits on, not just localhost. A local MCP server meant for one agent becomes an unauthenticated tool endpoint for the LAN, and a malicious web page can reach it through DNS rebinding to drive its tools (CVE-2026-59950, CVE-2026-63118, CVE-2025-66416, CVE-2026-23744).
    recommendation: Bind the server to 127.0.0.1 (or a Unix socket) for local use. If it genuinely must be remote, put it behind an authenticated gateway that validates the Origin/Host header against an allowlist, and never expose the raw server on 0.0.0.0.
    frameworks: ["OWASP-MCP MCP07:2025", "OWASP-ASI05:2026", "MITRE ATLAS AML.T0049", "NIST SC-7"]

  - id: ATL-148
    title: MCP server forwards the caller's session token or auth header downstream
    severity: high
    target: mcp_server
    match: { attr_any_contains: { env_keys: ["SESSION_COOKIE", "PASSTHROUGH", "PASS_THROUGH", "FORWARD_AUTH", "FORWARDED_AUTH", "FORWARD_BEARER", "FORWARDED_BEARER", "FORWARD_TOKEN", "FORWARDED_TOKEN", "HTTP_AUTHORIZATION"] } }
    description: An env var named for a forwarded auth header or session cookie (HTTP_AUTHORIZATION, SESSION_COOKIE, a *PASSTHROUGH*/FORWARD* token) shows the server is wired to reuse the caller's inbound credential on its downstream calls. Token passthrough breaks the audience binding of that token, defeats per-request authorization at the downstream API, and lets a compromised or confused server replay the caller's identity - the MCP authorization spec explicitly prohibits it.
    recommendation: Never forward the client's token downstream. Validate that every inbound token's audience is this server, then obtain a separate, audience-scoped credential on the server's own behalf (OAuth token exchange or a service identity) for the downstream call.
    frameworks: ["OWASP-MCP MCP01:2025", "OWASP-ASI03:2026", "MITRE ATLAS AML.T0098", "MCP Security Best Practices 2025-11-25", "NIST IA-5"]

  - id: ATL-104
    title: Secrets passed to MCP server via environment
    severity: medium
    target: mcp_server
    match: { attr_equals: { _env_has_secrets: true } }
    description: Credentials in tool-server env vars are exposed to the tool process and often to model context.
    recommendation: Use a secret manager or OS keychain; never place raw credentials where tool output can echo them.
    frameworks: ["NIST IA-5", "ASVS V2.10", "OWASP-ASI03:2026", "OWASP-MCP MCP01:2025"]

  - id: ATL-201
    title: Agent runtime and cloud share no declared boundary controls
    severity: info
    confidence: low
    target: model
    match: { model_has_both: ["mcp_server", "aws_"] }
    description: The design contains both agent tooling and cloud resources but no declared control between the two trust zones.
    recommendation: Document the authn/authz path from agent runtime to cloud APIs; deny by default.
    frameworks: ["NIST AC-4", "OWASP-ASI03:2026"]

  # --- v0.5 expansion: CIS AWS benchmarks + OWASP LLM Top 10 (2025) + MCP research ---

  - id: ATL-006
    title: RDS cluster storage not encrypted
    severity: high
    target: aws_rds_cluster
    match: { attr_equals: { storage_encrypted: false } }
    description: The RDS cluster stores data at rest without encryption; a snapshot or disk leak exposes plaintext.
    recommendation: Set storage_encrypted = true and supply a KMS key (kms_key_id) for customer-managed control.
    frameworks: ["CIS AWS 2.3.1", "NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-007
    title: RDS automated backups disabled
    severity: medium
    target: aws_rds_cluster
    match: { attr_in: { backup_retention_period: [0, "0"] } }
    description: A retention period of zero disables automated backups; there is no point-in-time recovery after data loss or ransomware.
    recommendation: Set backup_retention_period to at least 7 days (30+ for regulated workloads).
    frameworks: ["CIS AWS 2.3.2", "NIST CP-9", "SOC2 A1.2"]

  - id: ATL-008
    title: RDS IAM database authentication disabled
    severity: medium
    target: aws_rds_cluster
    match: { attr_equals: { iam_database_authentication_enabled: false } }
    description: The database relies on static passwords instead of short-lived IAM credentials, widening credential-theft impact.
    recommendation: Enable iam_database_authentication_enabled and issue access through IAM roles.
    frameworks: ["NIST IA-5", "SOC2 CC6.1"]

  - id: ATL-009
    title: RDS cluster is single-AZ
    severity: low
    target: aws_rds_cluster
    match: { attr_equals: { multi_az: false } }
    description: A single-AZ database has no automatic failover; an AZ outage takes the workload down.
    recommendation: Set multi_az = true for production databases.
    frameworks: ["NIST CP-10", "SOC2 A1.2"]

  - id: ATL-010
    title: RDS instance storage explicitly unencrypted
    severity: high
    target: aws_db_instance
    match: { attr_equals: { storage_encrypted: false } }
    description: Encryption at rest is explicitly disabled on the database instance.
    recommendation: Set storage_encrypted = true (and kms_key_id for a customer-managed key).
    frameworks: ["CIS AWS 2.3.1", "NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-011
    title: EBS volume not encrypted
    severity: high
    target: aws_ebs_volume
    match: { attr_equals: { encrypted: false } }
    description: The block volume stores data at rest in plaintext.
    recommendation: Set encrypted = true; enable account-level EBS encryption by default.
    frameworks: ["CIS AWS 2.2.1", "NIST SC-28"]

  - id: ATL-012
    title: EC2 instance auto-assigns a public IP
    severity: medium
    target: aws_instance
    match: { attr_equals: { associate_public_ip_address: true } }
    description: The instance is directly addressable from the internet, expanding the attack surface beyond the VPC.
    recommendation: Place the instance in a private subnet and reach it via a load balancer, NAT, or bastion.
    frameworks: ["NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-013
    title: KMS key rotation disabled
    severity: medium
    target: aws_kms_key
    match: { attr_equals: { enable_key_rotation: false } }
    description: Automatic annual key rotation is off, extending the blast radius of a compromised key.
    recommendation: Set enable_key_rotation = true.
    frameworks: ["CIS AWS 3.8", "NIST SC-12"]

  - id: ATL-014
    title: SNS topic not encrypted at rest
    severity: medium
    target: aws_sns_topic
    match: { attr_missing: kms_master_key_id }
    description: Messages published to the topic are stored without server-side encryption.
    recommendation: Set kms_master_key_id to a KMS key.
    frameworks: ["NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-015
    title: SQS queue not encrypted at rest
    severity: medium
    target: aws_sqs_queue
    match: { attr_missing: kms_master_key_id }
    description: Queued messages are stored without server-side encryption.
    recommendation: Set kms_master_key_id (or enable SQS-managed SSE).
    frameworks: ["NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-016
    title: S3 bucket ACL grants all authenticated AWS users
    severity: high
    target: aws_s3_bucket
    match: { attr_in: { acl: ["authenticated-read"] } }
    description: The authenticated-read ACL grants access to every authenticated AWS account, not just your own.
    recommendation: Remove the ACL grant and use bucket policies scoped to specific principals.
    frameworks: ["NIST AC-3", "SOC2 CC6.1"]

  - id: ATL-017
    title: Neptune cluster storage not encrypted
    severity: high
    target: aws_neptune_cluster
    match: { attr_equals: { storage_encrypted: false } }
    description: The graph database stores data at rest without encryption.
    recommendation: Set storage_encrypted = true with a KMS key.
    frameworks: ["NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-018
    title: Redshift cluster publicly accessible
    severity: critical
    target: aws_redshift_cluster
    match: { attr_equals: { publicly_accessible: true } }
    description: The data warehouse endpoint is reachable from the public internet.
    recommendation: Set publicly_accessible = false and place the cluster in private subnets.
    frameworks: ["NIST SC-7", "SOC2 CC6.1"]

  - id: ATL-105
    title: MCP server auto-installs packages at launch
    severity: high
    target: mcp_server
    match: { attr_list_contains: { args: "-y" }}
    description: The server is launched with an auto-confirm installer (npx -y / uvx), fetching and running remote package code with no pinned integrity check. A compromised or typosquatted package becomes code execution in the agent's context.
    recommendation: Pin the package to an exact version and integrity hash; vendor or mirror it; drop the auto-confirm flag.
    frameworks: ["OWASP LLM05 Supply Chain", "MITRE ATLAS AML.T0010", "MITRE ATLAS AML.T0104", "NIST SA-12", "OWASP-ASI04:2026", "OWASP-MCP MCP04:2025", "Agentic-SoK 2026 R4"]

  - id: ATL-106
    title: MCP server pinned to a mutable tag
    severity: medium
    target: mcp_server
    match: { attr_any_contains: { args: ["@latest", ":latest"] } }
    description: The tool server tracks a mutable tag, so its code can change under you after review (a tool-poisoning rug-pull) with no re-attestation.
    recommendation: Pin to an immutable version or digest so the reviewed tool is the tool that runs.
    frameworks: ["OWASP LLM05 Supply Chain", "MITRE ATLAS AML.T0109", "MITRE ATLAS AML.T0010", "OWASP-ASI04:2026", "OWASP-MCP MCP04:2025"]

  - id: ATL-107
    title: MCP server grants outbound network or browser access
    severity: medium
    target: mcp_server
    match: { attr_any_contains: { args: ["server-fetch", "mcp-server-fetch", "puppeteer", "playwright", "browser"] } }
    description: A fetch or browser tool gives the agent an outbound channel, which is both an SSRF surface and a data-exfiltration path if a prompt injection lands.
    recommendation: Constrain the tool to an allowlist of destinations; deny access to internal metadata endpoints and private ranges.
    frameworks: ["OWASP LLM02 Sensitive Information Disclosure", "OWASP-ASI02:2026", "NIST SC-7", "Agentic-SoK 2026 R1"]

  # --- v0.6 expansion: more AWS + Azure + GCP + Kubernetes ---

  # AWS: audit trail, registry, cluster, load balancer, storage, logs.
  - id: ATL-019
    title: CloudTrail is not multi-region
    severity: medium
    target: aws_cloudtrail
    match: { attr_equals: { is_multi_region_trail: false } }
    description: A single-region trail leaves activity in every other region unlogged; an attacker operating cross-region is invisible to audit.
    recommendation: Set is_multi_region_trail = true so management events are captured everywhere.
    frameworks: ["CIS AWS 3.1", "NIST AU-2", "SOC2 CC7.2"]

  - id: ATL-020
    title: CloudTrail log file validation disabled
    severity: medium
    target: aws_cloudtrail
    match: { attr_equals: { enable_log_file_validation: false } }
    description: Without log file validation, tampered or deleted audit logs cannot be detected, breaking the integrity of the audit record.
    recommendation: Set enable_log_file_validation = true to produce signed digest files.
    frameworks: ["CIS AWS 3.2", "NIST AU-9", "SOC2 CC7.2"]

  - id: ATL-021
    title: ECR repository allows mutable image tags
    severity: medium
    target: aws_ecr_repository
    match: { attr_equals: { image_tag_mutability: "MUTABLE" } }
    description: Mutable tags let an existing tag be overwritten with new code after review, enabling a supply-chain rug-pull with no re-attestation.
    recommendation: Set image_tag_mutability = "IMMUTABLE" and deploy by digest.
    frameworks: ["OWASP LLM05 Supply Chain", "NIST SA-12", "SOC2 CC8.1"]

  - id: ATL-022
    title: ECR image scanning on push disabled
    severity: low
    target: aws_ecr_repository
    match: { attr_equals: { scan_on_push: false } }
    description: Images are admitted to the registry without a vulnerability scan, so known-vulnerable layers ship unnoticed.
    recommendation: Enable scan_on_push (or enhanced scanning) so every pushed image is assessed.
    frameworks: ["CIS AWS 4.x", "NIST RA-5"]

  - id: ATL-023
    title: EKS cluster API endpoint is public
    severity: medium
    target: aws_eks_cluster
    match: { attr_equals: { endpoint_public_access: true } }
    description: The Kubernetes control-plane endpoint is reachable from the internet, exposing the API server to credential-stuffing and known-CVE probing.
    recommendation: Set endpoint_public_access = false (or restrict public_access_cidrs) and reach the API over private networking.
    frameworks: ["NIST SC-7", "CIS EKS 5.4.1", "SOC2 CC6.6"]

  - id: ATL-024
    title: Load balancer listener serves plaintext HTTP
    severity: medium
    target: aws_lb_listener
    match: { attr_equals: { protocol: "HTTP" } }
    description: The listener terminates plaintext HTTP; credentials and tokens cross the network unencrypted and are open to interception.
    recommendation: Use an HTTPS listener with a TLS certificate; redirect HTTP to HTTPS.
    frameworks: ["NIST SC-8", "ASVS V9.1", "SOC2 CC6.7"]

  - id: ATL-025
    title: EFS file system not encrypted at rest
    severity: high
    target: aws_efs_file_system
    match: { attr_equals: { encrypted: false } }
    description: The shared file system stores data at rest in plaintext; a disk or snapshot leak exposes it directly.
    recommendation: Set encrypted = true and supply a KMS key for customer-managed control.
    frameworks: ["NIST SC-28", "SOC2 CC6.7"]

  - id: ATL-026
    title: CloudWatch log group has no retention policy
    severity: low
    target: aws_cloudwatch_log_group
    match: { attr_missing: retention_in_days }
    description: Logs are retained indefinitely by default, which both inflates cost and, more importantly, is often unintentional - the design never decided a retention window.
    recommendation: Set retention_in_days to a deliberate window that matches your evidence-retention policy.
    frameworks: ["NIST AU-11", "SOC2 CC7.2"]

  # Azure
  - id: ATL-301
    title: Azure storage account allows public blob access
    severity: high
    target: azurerm_storage_account
    match: { attr_equals: { allow_nested_items_to_be_public: true } }
    description: Containers and blobs in the account can be set to anonymous public access, exposing stored data to the internet.
    recommendation: Set allow_nested_items_to_be_public = false to forbid anonymous access account-wide.
    frameworks: ["CIS Azure 3.7", "NIST AC-3", "SOC2 CC6.1"]

  - id: ATL-302
    title: Azure storage account permits non-HTTPS traffic
    severity: medium
    target: azurerm_storage_account
    match: { attr_equals: { enable_https_traffic_only: false } }
    description: The account accepts plaintext HTTP, so data in transit can be intercepted or tampered with.
    recommendation: Set enable_https_traffic_only = true (HTTPS-only).
    frameworks: ["CIS Azure 3.1", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-303
    title: Azure SQL server allows public network access
    severity: high
    target: azurerm_mssql_server
    match: { attr_equals: { public_network_access_enabled: true } }
    description: The managed SQL server accepts connections from the public internet, widening the attack surface to the whole world.
    recommendation: Set public_network_access_enabled = false and reach the database via private endpoints.
    frameworks: ["CIS Azure 4.x", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-304
    title: Network security rule open to the internet
    severity: high
    target: azurerm_network_security_rule
    match: { attr_equals: { source_address_prefix: "*", access: "Allow", direction: "Inbound" } }
    description: An inbound allow rule with a wildcard source exposes the associated resources to traffic from any address on the internet.
    recommendation: Restrict source_address_prefix to known ranges; never combine a wildcard source with Allow/Inbound on sensitive ports.
    frameworks: ["CIS Azure 6.x", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-305
    title: Azure Key Vault purge protection disabled
    severity: medium
    target: azurerm_key_vault
    match: { attr_equals: { purge_protection_enabled: false } }
    description: Without purge protection, keys and secrets can be permanently deleted (maliciously or accidentally) before the retention window elapses, destroying the material and its audit trail.
    recommendation: Set purge_protection_enabled = true (with soft-delete) so deletions are recoverable.
    frameworks: ["CIS Azure 8.x", "NIST SC-12", "SOC2 A1.2"]

  - id: ATL-306
    title: Azure storage network default allows all traffic
    severity: medium
    target: azurerm_storage_account
    match: { attr_equals: { default_action: "Allow" } }
    description: The account's network rules default to Allow, so the firewall is effectively open and only overridden by explicit denies.
    recommendation: Set the network_rules default_action to "Deny" and allowlist specific networks.
    frameworks: ["CIS Azure 3.x", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-307
    title: Azure PostgreSQL server does not enforce SSL
    severity: high
    target: azurerm_postgresql_server
    match: { attr_equals: { ssl_enforcement_enabled: false } }
    description: The managed PostgreSQL server accepts unencrypted client connections, so credentials and query data can be intercepted in transit.
    recommendation: Set ssl_enforcement_enabled = true (and a modern ssl_minimal_tls_version).
    frameworks: ["CIS Azure 4.x", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-308
    title: Azure MySQL server does not enforce SSL
    severity: high
    target: azurerm_mysql_server
    match: { attr_equals: { ssl_enforcement_enabled: false } }
    description: The managed MySQL server accepts unencrypted client connections, exposing credentials and query data to interception.
    recommendation: Set ssl_enforcement_enabled = true (and a modern ssl_minimal_tls_version).
    frameworks: ["CIS Azure 4.x", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-309
    title: Azure storage account has infrastructure encryption disabled
    severity: medium
    target: azurerm_storage_account
    match: { attr_equals: { infrastructure_encryption_enabled: false } }
    description: Data is encrypted only once at rest; without the second infrastructure-encryption layer a single flaw in the service-managed encryption exposes stored data.
    recommendation: Set infrastructure_encryption_enabled = true so blobs are double-encrypted at rest.
    frameworks: ["CIS Azure 3.2", "NIST SC-28", "SOC2 CC6.1"]

  - id: ATL-310
    title: Azure storage account accepts TLS below 1.2
    severity: medium
    target: azurerm_storage_account
    match: { attr_in: { min_tls_version: ["TLS1_0", "TLS1_1"] } }
    description: The account negotiates deprecated TLS 1.0/1.1, whose known weaknesses let an attacker downgrade or decrypt data in transit.
    recommendation: Set min_tls_version = "TLS1_2" so only modern TLS is accepted.
    frameworks: ["CIS Azure 3.x", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-311
    title: Azure Key Vault allows public network access
    severity: high
    target: azurerm_key_vault
    match: { attr_equals: { public_network_access_enabled: true } }
    description: The vault holding keys, secrets and certificates is reachable from the public internet, widening the blast radius of a leaked credential to the whole world.
    recommendation: Set public_network_access_enabled = false and reach the vault via private endpoints.
    frameworks: ["CIS Azure 8.x", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-312
    title: Azure SQL database transparent data encryption disabled
    severity: high
    target: azurerm_mssql_database
    match: { attr_equals: { transparent_data_encryption_enabled: false } }
    description: The database files, backups and logs are stored unencrypted on disk, so theft of the underlying media or a backup exposes all data at rest.
    recommendation: Set transparent_data_encryption_enabled = true (ideally with a customer-managed key).
    frameworks: ["CIS Azure 4.x", "NIST SC-28", "SOC2 CC6.1"]

  - id: ATL-313
    title: Azure App Service does not require HTTPS
    severity: medium
    target: azurerm_linux_web_app
    match: { attr_equals: { https_only: false } }
    description: The web app answers plaintext HTTP, so session tokens and request data can be intercepted or tampered with in transit.
    recommendation: Set https_only = true so all traffic is redirected to HTTPS.
    frameworks: ["CIS Azure 9.x", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-314
    title: Azure Linux VM permits password authentication
    severity: high
    target: azurerm_linux_virtual_machine
    match: { attr_equals: { disable_password_authentication: false } }
    description: SSH password authentication is enabled, exposing the VM to credential brute-force and password-spray attacks instead of relying on key-based auth.
    recommendation: Set disable_password_authentication = true and provision access via SSH public keys only.
    frameworks: ["CIS Azure 7.x", "NIST IA-2", "NIST IA-5(1)"]

  - id: ATL-315
    title: Azure Kubernetes Service allows local accounts
    severity: high
    target: azurerm_kubernetes_cluster
    match: { attr_equals: { local_account_enabled: true } }
    description: Static local admin kubeconfigs remain enabled, so anyone who obtains one bypasses Entra ID / RBAC identity and audit controls on the cluster.
    recommendation: Set local_account_enabled = false and authenticate to AKS through Entra ID with RBAC.
    frameworks: ["CIS AKS 4.x", "NIST AC-2", "NIST AC-6"]

  - id: ATL-316
    title: Azure PostgreSQL flexible server allows public network access
    severity: high
    target: azurerm_postgresql_flexible_server
    match: { attr_equals: { public_network_access_enabled: true } }
    description: The managed PostgreSQL flexible server accepts connections from the public internet, widening the attack surface to the whole world.
    recommendation: Set public_network_access_enabled = false and reach the server over a delegated subnet / private endpoint.
    frameworks: ["CIS Azure 4.x", "NIST SC-7", "SOC2 CC6.6"]

  # GCP
  - id: ATL-401
    title: GCP firewall rule open to the internet
    severity: high
    target: google_compute_firewall
    match: { attr_any_contains: { source_ranges: ["0.0.0.0/0"] } }
    description: The firewall permits ingress from any IPv4 address, exposing the targeted instances to the entire internet.
    recommendation: Restrict source_ranges to known CIDRs; front public services with a load balancer and IAP.
    frameworks: ["CIS GCP 3.x", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-402
    title: Cloud SQL instance has a public IP
    severity: high
    target: google_sql_database_instance
    match: { attr_equals: { ipv4_enabled: true } }
    description: The database instance is assigned a public IPv4 address, making the endpoint reachable from the internet.
    recommendation: Set ipv4_enabled = false and connect over a private IP / the Cloud SQL Auth Proxy.
    frameworks: ["CIS GCP 6.x", "NIST SC-7", "SOC2 CC6.1"]

  - id: ATL-403
    title: Cloud SQL instance does not require SSL
    severity: medium
    target: google_sql_database_instance
    match: { attr_equals: { require_ssl: false } }
    description: The instance accepts unencrypted client connections, so credentials and query data can be intercepted.
    recommendation: Set require_ssl = true (or ssl_mode to an encrypted-only value).
    frameworks: ["CIS GCP 6.x", "NIST SC-8", "SOC2 CC6.7"]

  - id: ATL-404
    title: GCS bucket uniform access control disabled
    severity: medium
    target: google_storage_bucket
    match: { attr_equals: { uniform_bucket_level_access: false } }
    description: With object-level ACLs enabled, access can be granted per-object outside IAM, making the true exposure of the bucket hard to reason about and easy to over-share.
    recommendation: Set uniform_bucket_level_access = true so access is governed solely by IAM.
    frameworks: ["CIS GCP 5.2", "NIST AC-3", "SOC2 CC6.1"]

  - id: ATL-405
    title: GKE cluster has legacy ABAC enabled
    severity: high
    target: google_container_cluster
    match: { attr_equals: { enable_legacy_abac: true } }
    description: Legacy ABAC grants broad, hard-to-audit permissions that bypass Kubernetes RBAC, undermining least privilege in the cluster.
    recommendation: Set enable_legacy_abac = false and authorize exclusively through RBAC.
    frameworks: ["CIS GKE 6.x", "NIST AC-6", "SOC2 CC6.3"]

  - id: ATL-406
    title: Compute instance service account granted full cloud-platform scope
    severity: high
    target: google_compute_instance
    match: { attr_any_contains: { scopes: ["cloud-platform"] } }
    description: The instance's service account is scoped to cloud-platform, granting the VM full access to every Google Cloud API, so any host compromise becomes broad project access.
    recommendation: Replace the cloud-platform scope with the narrow per-API scopes the workload needs, and avoid running as the default service account.
    frameworks: ["CIS GCP 4.2", "NIST AC-6", "SOC2 CC6.3"]

  - id: ATL-407
    title: Compute instance permits IP forwarding
    severity: medium
    target: google_compute_instance
    match: { attr_equals: { can_ip_forward: true } }
    description: IP forwarding lets the instance send and receive packets for addresses other than its own, enabling traffic interception and lateral man-in-the-middle movement inside the VPC.
    recommendation: Set can_ip_forward = false unless the instance is a deliberately designed router or NAT appliance.
    frameworks: ["CIS GCP 4.6", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-408
    title: Compute instance not launched as a Shielded VM
    severity: medium
    target: google_compute_instance
    match: { attr_equals: { enable_integrity_monitoring: false } }
    description: With Shielded VM integrity monitoring off, boot-level tampering (a malicious bootloader or kernel rootkit) on the instance goes undetected.
    recommendation: Enable Shielded VM - set enable_integrity_monitoring, enable_vtpm, and enable_secure_boot = true.
    frameworks: ["CIS GCP 4.8", "NIST SI-7", "SOC2 CC6.8"]

  - id: ATL-409
    title: GKE cluster nodes are not private
    severity: high
    target: google_container_cluster
    match: { attr_equals: { enable_private_nodes: false } }
    description: Nodes without private networking receive public IP addresses, exposing the node surface directly to the internet instead of keeping it inside the VPC.
    recommendation: Set enable_private_nodes = true so nodes have only internal IPs and reach the internet through Cloud NAT.
    frameworks: ["CIS GKE 6.6", "NIST SC-7", "SOC2 CC6.6"]

  - id: ATL-410
    title: GKE cluster does not use Shielded GKE Nodes
    severity: medium
    target: google_container_cluster
    match: { attr_equals: { enable_shielded_nodes: false } }
    description: Without Shielded GKE Nodes the cluster's nodes lack verified boot and node-identity attestation, so a tampered or spoofed node can join the cluster and serve workloads.
    recommendation: Set enable_shielded_nodes = true to enforce secure boot and node integrity verification.
    frameworks: ["CIS GKE 6.5", "NIST SI-7", "SOC2 CC6.8"]

  - id: ATL-411
    title: GKE cluster issues client certificates for authentication
    severity: high
    target: google_container_cluster
    match: { attr_equals: { issue_client_certificate: true } }
    description: Client-certificate authentication to the API server relies on a long-lived, non-revocable credential that bypasses IAM and is a well-known GKE privilege-escalation path.
    recommendation: Set issue_client_certificate = false and authenticate to the API server through IAM / OIDC instead.
    frameworks: ["CIS GKE 6.8", "NIST IA-5", "SOC2 CC6.1"]

  - id: ATL-412
    title: GCS bucket grants IAM access to all users
    severity: critical
    target: google_storage_bucket_iam_member
    match: { attr_in: { member: ["allUsers", "allAuthenticatedUsers"] } }
    description: An IAM binding to allUsers (or allAuthenticatedUsers) makes the bucket anonymously or publicly accessible, exposing every stored object to the entire internet.
    recommendation: Remove the allUsers/allAuthenticatedUsers member, grant access only to specific principals, and enable public access prevention on the bucket.
    frameworks: ["CIS GCP 5.1", "NIST AC-3", "SOC2 CC6.1"]

  - id: ATL-413
    title: KMS crypto key has no rotation period
    severity: medium
    target: google_kms_crypto_key
    match: { attr_missing: rotation_period }
    description: The encryption key declares no automatic rotation, so a single compromised key version keeps protecting all data indefinitely, widening the blast radius of key exposure.
    recommendation: Set rotation_period to at most 90 days (7776000s) so key material is rotated automatically.
    frameworks: ["CIS GCP 1.10", "NIST SC-12", "SOC2 CC6.7"]

  # Kubernetes workloads (from raw manifests)
  - id: ATL-501
    title: Privileged container
    severity: critical
    target: k8s_container
    match: { attr_equals: { privileged: true } }
    description: A privileged container has effectively unrestricted host access; a single compromise becomes node compromise and a cluster-wide breakout path.
    recommendation: Remove privileged; grant only the specific capabilities the workload needs.
    frameworks: ["CIS K8s 5.2.1", "NIST AC-6", "MITRE ATLAS AML.T0011"]

  - id: ATL-502
    title: Container allows privilege escalation
    severity: high
    target: k8s_container
    match: { attr_equals: { allow_privilege_escalation: true } }
    description: allowPrivilegeEscalation permits a process to gain more privileges than its parent (e.g. via setuid binaries), enabling in-container escalation.
    recommendation: Set securityContext.allowPrivilegeEscalation = false.
    frameworks: ["CIS K8s 5.2.5", "NIST AC-6"]

  - id: ATL-503
    title: Container adds dangerous Linux capabilities
    severity: high
    target: k8s_container
    match: { attr_list_any_of: { _capabilities_add: ["ALL", "SYS_ADMIN", "NET_ADMIN", "SYS_PTRACE", "SYS_MODULE", "NET_RAW"] } }
    description: The container requests kernel-level capabilities that materially widen the blast radius of a compromise (host tampering, traffic sniffing, module loading).
    recommendation: Drop ALL capabilities and add back only the minimum the workload provably needs.
    frameworks: ["CIS K8s 5.2.8", "NIST AC-6", "MITRE ATLAS AML.T0011"]

  - id: ATL-504
    title: Container has no CPU/memory limits
    severity: medium
    target: k8s_container
    match: { attr_equals: { _has_limits: false } }
    description: Without resource limits a single workload can exhaust node resources, a denial-of-service and noisy-neighbor risk.
    recommendation: Set resources.limits for cpu and memory on every container.
    frameworks: ["CIS K8s 5.x", "NIST SC-6", "SOC2 A1.1"]

  - id: ATL-505
    title: Container image uses a mutable tag
    severity: medium
    target: k8s_container
    match: { attr_any_contains: { image: [":latest"] } }
    description: A :latest (or other mutable) tag means the running code can change under you between deploys, defeating reproducibility and any prior review of the image.
    recommendation: Pin the image to an immutable digest (image@sha256:...).
    frameworks: ["OWASP LLM05 Supply Chain", "NIST CM-2", "SOC2 CC8.1"]

  - id: ATL-506
    title: Container runs as the root user
    severity: high
    target: k8s_container
    match: { attr_in: { run_as_user: [0, "0"] } }
    description: Running as UID 0 means a container escape lands as root on the node, removing a key barrier to host compromise.
    recommendation: Set runAsUser to a non-zero UID and runAsNonRoot = true.
    frameworks: ["CIS K8s 5.2.6", "NIST AC-6"]

  - id: ATL-507
    title: Container root filesystem is writable
    severity: low
    target: k8s_container
    match: { attr_equals: { read_only_root_filesystem: false } }
    description: A writable root filesystem lets an attacker drop tools or tamper with binaries in place, aiding persistence.
    recommendation: Set readOnlyRootFilesystem = true and mount writable paths as explicit volumes.
    frameworks: ["CIS K8s 5.2.x", "NIST SI-7"]

  - id: ATL-508
    title: Pod uses the host network namespace
    severity: high
    target: k8s_workload
    match: { attr_equals: { host_network: true } }
    description: hostNetwork places the pod directly on the node's network, bypassing network policy and exposing node-local services to the workload.
    recommendation: Remove hostNetwork; use a Service and NetworkPolicy instead.
    frameworks: ["CIS K8s 5.2.4", "NIST SC-7"]

  - id: ATL-509
    title: Pod uses the host PID namespace
    severity: high
    target: k8s_workload
    match: { attr_equals: { host_pid: true } }
    description: hostPID lets the pod see and signal every process on the node, a strong lateral-movement and information-disclosure primitive.
    recommendation: Remove hostPID; isolate the workload in its own PID namespace.
    frameworks: ["CIS K8s 5.2.2", "NIST AC-6"]

  - id: ATL-510
    title: Pod mounts a hostPath volume
    severity: high
    target: k8s_workload
    match: { attr_list_contains: { _volume_types: "hostPath" } }
    description: A hostPath volume mounts a node directory into the pod; depending on the path it can expose or tamper with host files, container runtime sockets, or credentials.
    recommendation: Replace hostPath with a purpose-built volume type; if unavoidable, scope it to a narrow read-only path.
    frameworks: ["CIS K8s 5.2.x", "NIST AC-6", "MITRE ATLAS AML.T0011"]

  # --- Agentic depth wave: anchored to the OWASP Top 10 for Agentic
  # --- Applications 2026 (ASI01-ASI10), the OWASP MCP Top 10 (MCP01-MCP10:2025),
  # --- and the MCP security best-practices spec revision 2025-11-25.
  # --- Fixtures: examples/agentic-risks/.

  - id: ATL-108
    title: Agent tool calls auto-approved without a human checkpoint
    severity: critical
    target: mcp_server
    match: { attr_equals: { _auto_approve: true } }
    description: An auto-approve list or autonomy flag lets every tool call run end-to-end, so one injected instruction executes with no human ever seeing it.
    recommendation: Remove blanket auto-approval; allowlist only low-risk read-only tools and require confirmation for write, execute, and network actions.
    frameworks: ["OWASP-ASI03:2026", "OWASP LLM06 Excessive Agency", "NIST AC-6", "Agentic-SoK 2026 R6"]

  - id: ATL-109
    title: Remote MCP server without authentication
    severity: high
    target: mcp_server
    match: { attr_equals: { _remote_unauthed: true } }
    description: The agent connects to a network MCP endpoint with no credential, so anyone who can reach the endpoint can drive the tool server or impersonate it to the agent.
    recommendation: Require OAuth or an API key on the endpoint per the MCP auth spec (2025-11-25 revision) and pin the server identity.
    frameworks: ["OWASP-ASI03:2026", "OWASP-MCP MCP07:2025", "MCP Security Best Practices 2025-11-25", "NSA CSI MCP 05/2026", "NIST IA-2"]

  - id: ATL-110
    title: Credential passed to MCP server as a command-line argument
    severity: high
    target: mcp_server
    match: { attr_any_contains: { args: ["--api-key", "--token", "--password", "--secret", "--access-key"] } }
    description: Secrets in argv are visible to every process on the host and to anything that captures the launch command, including agent context and logs.
    recommendation: Move the credential to a secret manager or OS keychain reference; never place it in launch arguments.
    frameworks: ["NIST IA-5", "ASVS V2.10", "OWASP-ASI03:2026", "OWASP-MCP MCP01:2025"]

  - id: ATL-111
    title: MCP server container mounts a broad host path
    severity: high
    target: mcp_server
    match: { attr_any_contains: { args: ["-v /:", "/Users:", "/home:", "/etc:", "/var/run/docker.sock"] } }
    description: The containerized tool server bind-mounts a sensitive host directory (or the Docker socket), so container isolation no longer limits what the agent can read or change.
    recommendation: Mount only the specific project directory the workflow needs, read-only where possible; never expose the Docker socket to a tool server.
    frameworks: ["OWASP-ASI02:2026", "CIS Docker 5.5", "NIST AC-6"]

  - id: ATL-112
    title: Agent tool server holds cloud credentials
    severity: high
    target: mcp_server
    match: { attr_equals: { _has_cloud_credentials: true } }
    description: The tool server's environment carries cloud provider credentials, a live and provable path from the agent runtime into the cloud trust boundary (recorded as a reachability edge in the model).
    recommendation: Put cloud access behind a scoped broker or short-lived role assumption; never hand raw cloud keys to an agent-reachable tool process.
    frameworks: ["OWASP-ASI03:2026", "NIST AC-4", "NIST IA-5", "OWASP-MCP MCP01:2025"]

  - id: ATL-113
    title: Agent instruction file is world-writable
    severity: high
    target: agent_instruction
    match: { attr_equals: { _world_writable: true } }
    description: A standing agent-instruction file (CLAUDE.md, .cursorrules, AGENTS.md, and the like) that any user on the host can rewrite is a persistent context-poisoning vector - one edit steers every future run of the agent, no prompt injection required.
    recommendation: Restrict write access to the instruction file and its directory to the owning user; treat these files as security-sensitive configuration, not scratch notes.
    frameworks: ["OWASP-ASI06:2026", "NIST AC-6", "NIST CM-5", "MITRE ATLAS AML.T0051", "Agentic-SoK 2026 V6"]

  - id: ATL-114
    title: Persistent agent memory store configured
    severity: medium
    target: mcp_server
    match: { attr_list_contains: { _capabilities: "memory" } }
    description: A cross-session memory / vector store is a memory-poisoning target - an attacker who writes crafted content into it steers the agent on future, unrelated runs (Kim et al. 2026 V6), and it is private data the agent reads back, widening the exfiltration surface.
    recommendation: Treat retrieved memory as untrusted input, validate and attribute writes to a trusted source, scope the store to the current task context, and never let unreviewed external content land in long-term memory.
    frameworks: ["OWASP-ASI06:2026", "Agentic-SoK 2026 V6", "Agentic-SoK 2026 R6", "MITRE ATLAS AML.T0070"]

  - id: ATL-115
    title: Remote MCP server holds a downstream credential (confused-deputy risk)
    severity: high
    target: mcp_server
    match: { attr_equals: { _confused_deputy: true } }
    description: A network-reachable server that also carries a downstream credential (a secret in env or a forwarded auth/token header) is a confused deputy - it can be induced to spend that delegated authority on an attacker's behalf, or to pass the token through to a third party.
    recommendation: Do not co-locate delegated credentials with a remote endpoint. Exchange the caller's own identity for a narrowly scoped, short-lived downstream token per request (per the MCP auth spec), and never forward a static credential onward.
    frameworks: ["MCP Security Best Practices 2025-11-25", "OWASP-ASI03:2026", "OWASP-MCP MCP01:2025", "NSA CSI MCP 05/2026", "NIST AC-4", "NIST IA-5", "Agentic-SoK 2026 R5"]

  - id: ATL-116
    title: Agent skill grants shell or unrestricted tool access
    severity: high
    target: agent_instruction
    match: { attr_equals: { _skill_broad_tools: true } }
    description: A packaged agent skill (SKILL.md) declares allowed-tools that include shell/exec or a wildcard, so any agent that auto-loads the skill inherits command execution - excessive agency bundled into a shareable, silently-loaded artifact.
    recommendation: Scope the skill's allowed-tools to the minimum read-only set it needs; never distribute a skill that grants shell or wildcard tool access.
    frameworks: ["OWASP-ASI03:2026", "OWASP LLM06 Excessive Agency", "NIST AC-6", "Agentic-SoK 2026 R6"]

  - id: ATL-117
    title: MCP server pinned to a version with a known CVE
    severity: critical
    target: mcp_server
    match: { attr_equals: { _has_known_cve: true } }
    description: The server launches a package version that carries a published security advisory (for example mcp-remote at or below 0.1.15, CVE-2025-6514, an OS command injection that reaches remote code execution when connecting to an untrusted remote server). The exact advisory id is recorded on the component.
    recommendation: Upgrade the package to a fixed version immediately, and pin to that exact version (or a digest) so a downgrade cannot silently reintroduce the flaw.
    frameworks: ["OWASP LLM05 Supply Chain", "MITRE ATLAS AML.T0010", "MITRE ATLAS AML.T0104", "OWASP-ASI04:2026", "OWASP-MCP MCP04:2025", "CVE-2025-6514"]

  - id: ATL-118
    title: Agent hook configuration runs commands (config injection)
    severity: critical
    target: agent_config
    match: { attr_equals: { _hook_runs_commands: true } }
    description: A repo-supplied agent settings file (for example .claude/settings.json) defines hooks that execute shell commands. Opening or trusting the repo runs that code on the developer's machine with no prompt - the config-injection class behind CVE-2025-59536 in Claude Code.
    recommendation: Never accept hook definitions from an untrusted repository. Review and pin hook commands in user-scoped settings, and treat a project-scoped settings file that adds command-running hooks as executable code, not configuration.
    frameworks: ["OWASP-ASI06:2026", "MITRE ATLAS AML.T0051", "NIST CM-5", "CVE-2025-59536"]

  - id: ATL-202
    title: Tool fleet forms an exfiltration chain (lethal trifecta)
    severity: critical
    target: model
    match: { model_capability_combo: [["filesystem", "database", "saas_data", "memory"], ["network", "messaging"]] }
    description: Across the configured servers the agent can read private data (files, databases, SaaS, or persistent memory) and reach an outbound channel, so one indirect prompt injection anywhere in its inputs can quietly exfiltrate what it reads.
    recommendation: Split the workflow so no single agent session combines private-data access with unrestricted egress, or gate the egress tool behind human approval and a destination allowlist.
    frameworks: ["OWASP-ASI02:2026", "OWASP LLM01 Prompt Injection", "MITRE ATLAS AML.T0051", "Agentic-SoK 2026 R3", "Agentic-SoK 2026 R5"]

  - id: ATL-203
    title: Tool fleet combines shell execution with outbound network reach
    severity: high
    target: model
    match: { model_capability_combo: [["shell"], ["network", "messaging"]] }
    description: The agent can both execute commands and talk to the internet, which turns a single injected instruction into download-and-run or command-and-control.
    recommendation: Remove one side of the pair per session, or force shell use through an allowlisted, non-networked sandbox.
    frameworks: ["OWASP-ASI05:2026", "OWASP-ASI02:2026", "NIST SC-7", "Agentic-SoK 2026 R6"]

  - id: ATL-207
    title: Unsafe data flow - untrusted input can reach a sensitive action
    severity: high
    target: model
    match: { model_taint_flow: { sources: ["network", "saas_data", "memory"], sinks: ["shell"] } }
    description: The fleet contains a server that ingests untrusted external content (web/fetch, SaaS data, or memory) and a server that can execute commands, so injected content flowing from source to sink becomes indirect-injection-to-code-execution. The source and sink servers are named in the finding, and the flow is recorded as taint edges in the model.
    recommendation: Break the path - keep untrusted-input tools and execution tools in separate agent sessions, or interpose a validation/allowlist step so retrieved content can never drive the executor.
    frameworks: ["OWASP-ASI02:2026", "OWASP LLM01 Prompt Injection", "Agentic-SoK 2026 R3", "Agentic-SoK 2026 R6", "MITRE ATLAS AML.T0051"]

  # --- Cross-server tool shadowing wave: the attack surface created by
  # --- running several MCP servers side by side. Anchored to SAFE-MCP
  # --- SAF-T1301 (Cross-Server Tool Shadowing), SAF-T1001/SAF-T1003, and the
  # --- OWASP Agentic Top 10 2026. Fixtures: examples/tool-shadowing/.
  # --- All three are model-level by nature: no single server is the finding,
  # --- so a per-resource linter cannot express these checks at all.

  - id: ATL-204
    title: Tool name exposed by more than one MCP server
    severity: high
    target: model
    match: { model_tool_name_collision: true }
    description: Two servers in the fleet declare a tool with the same name, so tool routing is ambiguous and a lower-trust server can answer calls the agent believes go to the trusted one.
    recommendation: Rename or namespace the colliding tool, or remove one of the servers; every tool name must identify exactly one implementation across the fleet.
    frameworks: ["SAFE-MCP SAF-T1301", "OWASP-ASI02:2026", "OWASP-MCP MCP09:2025", "NIST IA-4"]

  # Deliberately structural, not language-based: the matcher cross-references
  # tool *identifiers* against the fleet inventory, which only the system model
  # can see. Whether the wording is also an injection payload is ml.py's job -
  # this fires even when the steering text reads as perfectly innocent.
  - id: ATL-205
    title: Tool description steers the use of another server's tools
    severity: critical
    target: model
    match: { model_cross_server_tool_reference: true }
    description: A server's tool metadata references a tool that belongs to a different server - the cross-server shadowing pattern, where guidance planted in one server's descriptions silently changes how the agent uses a tool it trusts elsewhere.
    recommendation: Remove the cross-server reference; a tool description must describe only its own tool. Treat the referencing server as untrusted until it has been reviewed.
    frameworks: ["SAFE-MCP SAF-T1301", "OWASP-ASI06:2026", "OWASP-MCP MCP03:2025", "MITRE ATLAS AML.T0110", "MITRE ATLAS AML.T0051"]

  - id: ATL-206
    title: One MCP server name resolves to different launch targets
    severity: high
    target: model
    match: { model_server_name_conflict: true }
    description: The same server name is defined more than once with different commands or endpoints, so which code answers to that identity depends on config precedence - the shape of a server-impersonation or rug-pull attack.
    recommendation: Keep one definition per server name; if an override is intentional, make the definitions identical or rename the variant so the identity is unambiguous.
    frameworks: ["SAFE-MCP SAF-T1003", "OWASP-ASI04:2026", "OWASP-MCP MCP09:2025", "MCP Security Best Practices 2025-11-25", "NSA CSI MCP 05/2026", "NIST IA-4"]

  # --- Multi-agent delegation wave: subagent definitions (.claude/agents/)
  # --- and A2A agent cards (.well-known/agent-card.json) are part of the
  # --- system's capability surface. Subagent tool grants feed the fleet
  # --- combination rules (ATL-202/203/207) via the engine's delegation
  # --- closure. Fixtures: examples/multi-agent/.

  - id: ATL-119
    title: Subagent granted shell execution
    severity: high
    target: subagent
    match: { attr_list_contains: { _capabilities: "shell" } }
    description: A delegate the main agent can invoke holds a shell-execution tool grant, so one injected instruction anywhere in the delegation chain becomes command execution - outside the MCP fleet most reviews look at.
    recommendation: Drop Bash from the subagent's tools list; give it narrowly scoped tools, or gate its invocation behind human approval.
    frameworks: ["OWASP-ASI05:2026", "OWASP-ASI02:2026", "NIST AC-6"]

  - id: ATL-120
    title: Subagent inherits every tool of the main agent
    severity: medium
    target: subagent
    match: { attr_equals: { _wildcard_tools: true } }
    description: The subagent declares no tools list (or a wildcard), so it inherits the main agent's full tool surface - excessive agency in a delegate whose prompt and purpose were written for a narrower job.
    recommendation: Declare an explicit, minimal tools list in the subagent's frontmatter.
    frameworks: ["OWASP LLM06 Excessive Agency", "OWASP-ASI02:2026", "NIST AC-6"]

  - id: ATL-121
    title: A2A agent endpoint declares no authentication
    severity: high
    target: a2a_agent
    match: { attr_equals: { _no_auth_declared: true } }
    description: The agent card advertises an endpoint with no securitySchemes or security requirement, so any agent (or attacker) that can reach the URL can delegate tasks to it and consume its skills - a public agent.
    recommendation: Declare securitySchemes (OpenAPI-style) in the agent card and enforce them at the endpoint; require per-caller identity for inter-agent requests.
    frameworks: ["OWASP-ASI07:2026", "A2A Protocol AgentCard v1", "NIST IA-2"]

  - id: ATL-122
    title: A2A agent endpoint served over plaintext HTTP
    severity: high
    target: a2a_agent
    match: { attr_starts_with: { url: "http://" } }
    description: Inter-agent task traffic (instructions, artifacts, and any data the tasks carry) crosses the network unencrypted and can be read or altered in transit.
    recommendation: Serve the A2A endpoint over HTTPS only and update the agent card url.
    frameworks: ["OWASP-ASI07:2026", "NIST SC-8"]

  - id: ATL-123
    title: A2A agent card defines auth schemes but requires none
    severity: high
    target: a2a_agent
    match: { attr_equals: { _auth_defined_not_required: true } }
    description: The card declares securitySchemes but has no security requirement, so per the A2A spec every skill is callable with no credential - a public agent that looks protected. This is the misconfiguration a reviewer skims past because auth "is configured".
    recommendation: Add a non-empty top-level security requirement (or per-skill security) that references the declared schemes, and enforce it at the endpoint.
    frameworks: ["OWASP-ASI07:2026", "A2A Protocol AgentCard v1", "NIST AC-3"]

  - id: ATL-208
    title: External agents can reach sensitive tools through a public A2A endpoint
    severity: critical
    target: model
    match: { model_external_agent_reach: ["shell", "filesystem", "database", "memory", "saas_data"] }
    description: An A2A endpoint that any external agent can invoke (no auth, or schemes defined but not required) fronts a runtime whose tools can execute commands or read private data. An unauthenticated caller can delegate a task that drives those tools - the inter-agent analogue of the lethal trifecta, visible only when the endpoint and the tool fleet are modeled together.
    recommendation: Require authentication on the A2A endpoint (a non-empty security requirement over real schemes) and authorize per caller; or remove the sensitive tools from the externally-reachable agent's runtime.
    frameworks: ["OWASP-ASI07:2026", "OWASP-ASI03:2026", "A2A Protocol AgentCard v1", "NIST AC-4"]

  - id: ATL-210
    title: Complete external attack path - public A2A endpoint to code execution to exfiltration or cloud
    severity: critical
    target: model
    match: { model_attack_path: true }
    description: A single connected path exists from an externally-reachable A2A endpoint, through a code-execution tool, to an exfiltration channel or a cloud credential - one agent session where an outside caller can get IN, RUN commands, and get data OUT. The individual rungs are separate findings; this is the assembled kill chain, which only a whole-system model can trace end to end.
    recommendation: Break the chain at any rung - authenticate the A2A endpoint, remove shell/code-execution tools from the externally-reachable runtime, or gate the egress and cloud tools behind human approval and a destination allowlist.
    frameworks: ["OWASP-ASI08:2026", "OWASP-ASI07:2026", "OWASP-ASI05:2026", "MITRE ATLAS AML.T0051"]

  - id: ATL-209
    title: External agents can reach cloud infrastructure through a public A2A endpoint
    severity: critical
    target: model
    match: { model_external_cloud_reach: true }
    description: An effectively-public A2A endpoint shares a runtime with a tool server that holds cloud credentials, so an external agent that reaches the card can delegate a task that drives the cloud-credentialed tool and pivot into the cloud account - a caller-to-endpoint-to-tool-to-cloud path no per-component check can see. This is the inter-agent delegation escalation the A2A/RFC 8693 guidance exists to prevent - a broad credential reachable across the agent boundary instead of a scoped, exchanged token.
    recommendation: Require authentication on the A2A endpoint and exchange the caller's identity for a narrowly-scoped, short-lived downstream token (OAuth 2.0 Token Exchange, RFC 8693) rather than co-locating a broad cloud credential with an externally-reachable agent.
    frameworks: ["OWASP-ASI07:2026", "OWASP-ASI03:2026", "MCP Security Best Practices 2025-11-25", "NIST AC-4"]

  # --- Shared-identity / RAG wave: the identity-propagation gap between a
  # --- multi-caller agent endpoint and a single-credential data store.
  # --- Fixture: examples/rag-shared-identity/.

  - id: ATL-211
    title: Public agent endpoint fronts a data store through one shared static credential
    severity: high
    target: model
    match: { model_shared_identity_reach: true }
    description: A publicly callable A2A endpoint fronts a data-access server that reaches its store through a single static service credential, so every external caller reads with the same downstream identity and per-caller entitlements can never be enforced at the store.
    recommendation: Exchange each caller's identity for a scoped, short-lived downstream credential (OAuth 2.0 Token Exchange, RFC 8693) or enforce per-caller authorization at retrieval; never front a shared-identity store with a public endpoint.
    frameworks: ["OWASP-ASI03:2026", "OWASP-MCP MCP01:2025", "NIST AC-6", "NIST IA-2", "MCP Security Best Practices 2025-11-25"]

  # --- Guardrails coverage wave: NeMo Guardrails configs enter the system
  # --- model as guardrails_config components. Rails constrain the DIALOG
  # --- channel only - the tool fleet acts outside them - so these rules
  # --- cross-check the railed surface against the un-railed one.
  # --- Fixture: examples/guardrails-gap/.

  - id: ATL-124
    title: Guardrails validate input but never output
    severity: medium
    target: guardrails_config
    match: { attr_equals: { _output_unrailed: true } }
    description: The rails config declares input flows but no output flows, so the rails inspect what enters the dialog and never what leaves it - a manipulated reply (a leaked secret, an exfiltrating markdown link, an injected instruction to a downstream consumer) exits un-railed.
    recommendation: Add output rails symmetric with the input side (rails.output.flows, e.g. self check output) so every reply is validated before it leaves the model.
    frameworks: ["OWASP LLM05:2025 Improper Output Handling", "OWASP LLM02 Sensitive Information Disclosure", "NIST SI-15"]

  - id: ATL-125
    title: MCP server declares the sampling capability
    severity: medium
    target: mcp_server
    match: { attr_list_contains: { _declared_capabilities: "sampling" } }
    description: A server that can issue sampling/createMessage requests drives the user's own model - so it can drain model tokens on hidden tasks, keep injected text alive across turns, and nudge the model into tool calls the user never approved (Unit 42, 2025-12). Combined with blanket auto-approval, a server-initiated completion becomes covert tool invocation.
    recommendation: Enable sampling only for servers that genuinely need model completions; keep sampling requests behind user review, cap what a server may include in them, and never pair a sampling-capable server with auto-approval.
    frameworks: ["OWASP-ASI02:2026", "OWASP-MCP MCP06:2025", "MITRE ATLAS AML.T0051"]

  - id: ATL-126
    title: MCP server declares the elicitation capability
    severity: medium
    target: mcp_server
    match: { attr_list_contains: { _declared_capabilities: "elicitation" } }
    description: An elicitation-capable server can put free-form prompts in front of the user mid-task, and a poisoned or deceptive prompt is phrased to extract credentials or data the tool never legitimately needs ("When MCP Servers Attack", 2025-09) - a human-trust channel the model itself cannot police.
    recommendation: Restrict which servers may elicit, constrain elicitation to typed schema fields rather than free text, and show the user which server is asking and why before any response is returned.
    frameworks: ["OWASP-ASI09:2026", "OWASP-MCP MCP10:2025", "NIST IA-2"]

  - id: ATL-127
    title: Coding agent settings bypass the permission prompt
    severity: high
    target: agent_config
    match: { attr_equals: { _bypass_permissions: true } }
    description: A committed settings file sets the permission mode to bypass, so tool calls (shell, file writes, MCP tools) run with no human approval - and because the mode is resolved from repo-controlled config, a cloned or poisoned repo silently skips the workspace-trust gate before the user ever sees a prompt (CVE-2026-33068).
    recommendation: Remove the bypass mode from committed settings; keep the approval prompt on by default and grant standing approval per low-risk tool, never globally, and never from a file a repo can ship.
    frameworks: ["OWASP-ASI03:2026", "OWASP-MCP MCP02:2025", "OWASP LLM06 Excessive Agency", "NIST AC-6"]

  - id: ATL-128
    title: Repo settings auto-enable all project MCP servers
    severity: high
    target: agent_config
    match: { attr_equals: { _auto_enable_project_mcp: true } }
    description: With every project-declared MCP server auto-enabled, any server a repo lists in its .mcp.json starts without per-server consent, so a cloned or poisoned repo can launch an attacker-controlled server as a full-privilege local process the moment the workspace opens (CVE-2026-21852).
    recommendation: Leave project MCP servers opt-in; approve each server explicitly on first use and pin the trusted ones with an allowlist (allowedMcpServers) rather than enabling all of them at once.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP09:2025", "OWASP-MCP MCP02:2025", "NIST CM-7"]

  - id: ATL-129
    title: A2A agent card uses a removed OAuth flow
    severity: high
    target: a2a_agent
    match: { attr_equals: { _uses_removed_oauth_flow: true } }
    description: The agent card offers an OAuth2 implicit or password grant - flows the A2A spec removed at v1.0 because they expose tokens in redirects or ask agents to handle raw user credentials. A card still advertising them steers callers onto the withdrawn, weaker profile instead of device-code + PKCE.
    recommendation: Drop the implicit and password flows from the card's securitySchemes; offer authorization-code with PKCE (or client-credentials for service-to-service) per A2A 1.0.
    frameworks: ["OWASP-ASI07:2026", "OWASP-ASI03:2026", "A2A Protocol Spec 1.0", "NIST IA-2"]

  - id: ATL-130
    title: Public A2A agent card is unsigned
    severity: medium
    target: a2a_agent
    match: { attr_equals: { _public_unsigned: true } }
    description: An externally invocable agent publishes a card with no signatures block, so a peer has no way to verify the card is authentic - anyone can stand up a look-alike endpoint and publish a matching card, and callers cannot tell the two apart.
    recommendation: Sign the agent card per A2A 1.0 section 8.4 (add a signatures[] entry) so consumers can verify the card's issuer and integrity before they trust the endpoint it describes.
    frameworks: ["OWASP-ASI07:2026", "A2A Protocol Spec 1.0", "NIST IA-9"]

  - id: ATL-131
    title: MCP registry manifest hardcodes a credential
    severity: high
    target: mcp_registry_manifest
    match: { attr_equals: { _has_hardcoded_secret: true } }
    description: The published server.json carries a literal value on a secret variable or header, so the credential ships to everyone who installs the server from the registry - a secret in a package manifest is a secret in every consumer's environment.
    recommendation: Remove the value; declare the variable with isSecret true and isRequired so the client collects it at install time and never distributes it in the manifest.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP01:2025", "NIST IA-5", "NSA CSI MCP 05/2026"]

  - id: ATL-132
    title: MCP registry manifest leaves a secret variable unmarked
    severity: medium
    target: mcp_registry_manifest
    match: { attr_equals: { _has_unmarked_secret: true } }
    description: The manifest declares a secret-named variable (token / key / password) without isSecret set, so clients, logs, and the registry treat it as ordinary config and never redact it - the value leaks the first time it is echoed.
    recommendation: Mark every credential variable with isSecret true in the manifest so the whole toolchain knows to collect it securely and keep it out of logs and error output.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP01:2025", "NIST IA-5"]

  - id: ATL-133
    title: MCP registry manifest declares a deprecated transport (SSE or WebSocket)
    severity: low
    target: mcp_registry_manifest
    match: { attr_list_any_of: { _deprecated_transports: ["sse", "websocket", "ws"] } }
    description: The manifest advertises a transport the MCP spec has retired - HTTP+SSE (deprecated by SEP-2596 for streamable-http) or the early WebSocket transport (dropped for weak origin validation, CVE-2026-59950). Clients on the current spec drop these, so the server becomes unreachable to them and stays on an unmaintained, weaker channel.
    recommendation: Publish the server over streamable-http (or stdio for local use) and remove the sse/websocket transport entry before clients on the current spec stop connecting.
    frameworks: ["OWASP-MCP MCP04:2025", "MCP Security Best Practices 2025-11-25"]

  - id: ATL-212
    title: Dialog is railed but an auto-approved shell tool acts outside the rails
    severity: high
    target: model
    match: { model_railed_dialog_unrailed_execution: true }
    description: The team installed a guardrails layer and it is real - but it governs conversation, while an auto-approved shell-capable tool executes commands with no human checkpoint entirely outside the railed channel, so the safety the rails imply does not extend to the agent's most dangerous capability. Neither config can see the other; only the system model holds both. The finding names the rails config and the execution tool.
    recommendation: Require human approval on execution tools (remove blanket auto-approve) or enforce tool-level policy where the tools run - dialog rails cannot see tool side effects.
    frameworks: ["OWASP-ASI03:2026", "OWASP-ASI05:2026", "OWASP LLM06 Excessive Agency", "NIST AC-6"]

  - id: ATL-213
    title: Cross-repo toxic flow - the fleet completes an attack chain no single repo does
    severity: high
    target: model
    match: { model_cross_repo_toxic_flow: true }
    description: Across a fleet of repositories, the union of the agents' capabilities forms a complete attack chain - a way in (untrusted-input tools), a way to run code (a shell tool), and a way out (an egress channel) - but no single repo forms that chain alone, so each repository looks clean in isolation. A prompt injection entering one repo's agent drives a tool in another. This flow exists only across the repo boundary, which is exactly why a per-repo scan of any one repository cannot surface it; only a fleet model spanning them can. Produced by `attestral fleet`; the finding names which repo contributes the entry, the pivot, and the exfiltration.
    recommendation: Treat the fleet as one trust domain and break the chain at a repo boundary - keep untrusted-input tools and code-execution tools in separate agents that do not share a session or delegate to one another, or gate the cross-repo delegation with human approval.
    frameworks: ["OWASP-AgSec TOOL-1", "OWASP-ASI08:2026", "OWASP LLM06 Excessive Agency", "MITRE ATLAS AML.T0051", "NIST AC-4"]

  # --- Supply-chain + transport + execution hardening wave (2026): MCP-server
  # --- launch surfaces that current tool-poisoning / dependency-tampering
  # --- research flags. Anchored to the OWASP Top 10 for Agentic Applications
  # --- 2026 (ASI04 Supply Chain, ASI05 Unexpected Code Execution), the OWASP
  # --- MCP Top 10 2025 (MCP04/MCP05/MCP07), and OWASP LLM05. Each fires only on
  # --- a concrete launch flag, so absence never guesses.
  # --- Fixtures: examples/mcp-supply-chain/ and examples/agent-fleet-flows/.

  - id: ATL-134
    title: MCP server installed straight from a Git or URL source
    severity: high
    target: mcp_server
    match: { attr_any_contains: { args: ["github:", "git+", "gitlab:", "bitbucket:", "git://"] } }
    description: The server is launched from a raw Git ref or URL (npx github:owner/repo, pip install git+https://...), which bypasses the registry entirely - no immutable version, no published provenance, no review - and executes whatever that ref points to today. npm is moving to block Git-URL installs by default for exactly this bypass.
    recommendation: Publish the server to a registry and pin it to an exact version or digest; never install an agent tool server directly from a mutable Git ref or URL.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP04:2025", "OWASP LLM05 Supply Chain", "MITRE ATLAS AML.T0010", "NIST SA-12"]

  - id: ATL-135
    title: MCP server pulls packages from a non-default registry
    severity: medium
    target: mcp_server
    match: { attr_any_contains: { args: ["--registry", "--index-url", "--extra-index-url"] } }
    description: The launch command overrides the package registry (--registry / --index-url / --extra-index-url), so the tool server's code is fetched from a mirror outside the default supply chain - the setup that dependency-confusion and poisoned-mirror attacks rely on to slip substituted code into a trusted install.
    recommendation: Install from the default public registry (or a vetted internal proxy pinned by digest); drop the registry override unless the mirror is a controlled, audited source.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP04:2025", "OWASP LLM05 Supply Chain", "MITRE ATLAS AML.T0010", "NIST SA-12"]

  - id: ATL-136
    title: MCP server disables TLS certificate verification
    severity: high
    target: mcp_server
    match: { attr_list_any_of: { env_keys: ["NODE_TLS_REJECT_UNAUTHORIZED", "GIT_SSL_NO_VERIFY"] } }
    description: The server's environment turns off TLS certificate verification (NODE_TLS_REJECT_UNAUTHORIZED / GIT_SSL_NO_VERIFY), so its outbound connections accept any certificate - a man-in-the-middle can impersonate the upstream, swap the tool's code or responses, and the encrypted channel proves nothing about who is on the other end.
    recommendation: Remove the verification-disabling variable and fix the underlying certificate trust properly (install the correct CA); never ship an agent tool server that accepts unverified TLS.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP07:2025", "NIST SC-8", "NIST SC-23"]

  - id: ATL-137
    title: MCP server container launched with isolation-breaking flags
    severity: high
    target: mcp_server
    match: { attr_any_contains: { args: ["--privileged", "--network host", "--net=host", "--pid=host", "--cap-add", "--ipc=host", "--userns=host"] } }
    description: The containerized tool server runs with flags that dissolve container isolation (--privileged, host network/PID/IPC namespace, or added kernel capabilities), so a compromise of the agent's tool process is a compromise of the host, not just the container. Complements ATL-111, which covers broad host mounts.
    recommendation: Drop --privileged and the host-namespace / --cap-add flags; run the tool container unprivileged with the default namespaces and only the specific capabilities it provably needs.
    frameworks: ["OWASP-ASI05:2026", "OWASP-MCP MCP05:2025", "CIS Docker 5.4", "NIST AC-6"]

  - id: ATL-138
    title: MCP server exposes a Node inspector / debug port
    severity: medium
    target: mcp_server
    match: { attr_any_contains: { args: ["--inspect"] } }
    description: The server is launched with a Node inspector flag (--inspect / --inspect-brk), which opens a Chrome DevTools debug port; anyone who can reach that port gets arbitrary code execution in the tool process. A debug flag left in a launched agent tool server is a standing RCE surface.
    recommendation: Remove the --inspect flag from the production launch command; if debugging is needed, bind the inspector to localhost only and never leave it in a committed or shipped configuration.
    frameworks: ["OWASP-ASI05:2026", "OWASP-MCP MCP05:2025", "NIST SC-7", "CWE-489"]

  - id: ATL-139
    title: Code-defined agent grants shell or command execution
    severity: high
    target: code_agent
    match: { attr_list_contains: { _capabilities: "shell" } }
    description: An agent wired in framework code exposes a tool that runs shell commands or eval/exec (subprocess, os.system, exec), so one injected instruction becomes command execution - excessive agency defined in Python, outside the MCP fleet and the config files most reviews look at.
    recommendation: Replace the shell/exec tool with narrowly scoped, allowlisted operations; if command execution is unavoidable, run it in a non-networked sandbox and gate it behind human approval.
    frameworks: ["OWASP-ASI05:2026", "OWASP LLM06 Excessive Agency", "NIST AC-6"]

  - id: ATL-140
    title: MCP server reached over plaintext WebSocket
    severity: high
    target: mcp_server
    match: { attr_starts_with: { url: "ws://" } }
    description: The server endpoint uses ws:// (plaintext WebSocket), so tool traffic - prompts, tool results, and any data the calls carry - crosses the network unencrypted and can be read or altered in transit. ATL-101 catches http://; this closes the WebSocket-transport gap.
    recommendation: Serve the MCP endpoint over wss:// (TLS) only and update the server url.
    frameworks: ["OWASP-ASI03:2026", "OWASP-MCP MCP07:2025", "NIST SC-8"]

  - id: ATL-141
    title: Agent settings pre-approve unrestricted command execution
    severity: high
    target: agent_config
    match: { attr_equals: { _permissive_allow: true } }
    description: The committed agent settings (.claude/settings.json) carry an `allow` entry that grants a code-execution tool with no argument scope - `Bash(*)`, bare `Bash`, or `*` - so every command runs pre-approved with no human checkpoint for anyone who opens the repo. This is standing, unrestricted agency shipped in a file, distinct from the bypass-approval mode ATL-128 flags.
    recommendation: Remove the unscoped allow entry. Grant only the specific, argument-scoped commands the workflow needs (e.g. `Bash(git status)`, `Bash(npm test)`), and let everything else prompt.
    frameworks: ["OWASP-ASI03:2026", "OWASP-ASI05:2026", "OWASP LLM06 Excessive Agency", "NIST AC-6"]

  - id: ATL-142
    title: A2A agent authenticates with a long-lived static API key
    severity: medium
    target: a2a_agent
    match: { attr_equals: { _weak_auth_scheme: true } }
    description: The agent card requires authentication, but the scheme is a static `apiKey` rather than short-lived OAuth tokens. A leaked or logged key grants standing access with no rotation, no expiry, and no per-caller scope, so one exposure is a persistent compromise. The card enforces auth (unlike ATL-123), but the method chosen is the weak one.
    recommendation: Use OAuth 2.0 with short-lived access tokens (per the A2A and MCP auth guidance) instead of a static API key, or at minimum rotate the key on a schedule and scope it per caller.
    frameworks: ["OWASP-ASI03:2026", "OWASP-MCP MCP07:2025", "OAuth 2.0 (RFC 6749)", "NIST IA-5"]

  - id: ATL-143
    title: Registry manifest ships a package pinned to a mutable version
    severity: high
    target: mcp_registry_manifest
    match: { attr_equals: { _has_mutable_pin: true } }
    description: A package in the published registry manifest is pinned to a mutable version (`latest`, or no version at all), so everyone who installs from it gets whatever the registry serves that day, not the reviewed artifact. That is a supply-chain rug-pull surface at the registry layer, the published-manifest analogue of ATL-106's mutable image tag.
    recommendation: Pin every package to an exact, immutable version (and an integrity hash where the ecosystem supports it) in the manifest, so the tool that was reviewed is the tool that installs.
    frameworks: ["OWASP-ASI04:2026", "OWASP-MCP MCP04:2025", "OWASP LLM03 Supply Chain", "NIST CM-2"]

  - id: ATL-144
    title: Bedrock AgentCore runtime role attached to the full-access managed policy
    severity: high
    target: aws_iam_role_policy_attachment
    match: { attr_contains: { policy_arn: "BedrockAgentCoreFullAccess" } }
    description: BedrockAgentCoreFullAccess is the dev/quickstart default the AgentCore starter toolkit auto-generates, and it grants broad, account-wide AgentCore actions, including GetWorkloadAccessTokenForUserId, which mints a workload access token from a caller-supplied user id with no identity-provider verification. Left attached in production, a compromised agent runtime can mint tokens for arbitrary users, not just act within its own workload.
    recommendation: Replace the managed policy with a role scoped to the exact AgentCore resource ARNs the runtime needs, and deny GetWorkloadAccessTokenForUserId unless the agent genuinely has no JWT available (prefer GetWorkloadAccessTokenForJWT, which validates signature, issuer, and expiry).
    frameworks: ["NIST AC-6", "OWASP-ASI03:2026", "OWASP LLM06 Excessive Agency"]

  - id: ATL-145
    title: Agent dependency pinned to a version with a known CVE
    severity: critical
    target: dependency
    match: { attr_equals: { _has_known_cve: true } }
    description: The agent's declared dependencies pin a package version that carries a published security advisory (for example langchain-core below 0.3.81 / 1.2.5, CVE-2025-68664 "LangGrinch", a serialization-injection flaw that exfiltrates environment secrets). The vulnerability lives in the dependency tree, which a config-only review never sees; the exact advisory id is recorded on the component.
    recommendation: Upgrade the dependency to a fixed version immediately and pin it exactly (or by hash / lockfile) so a resolver cannot silently reintroduce the vulnerable version.
    frameworks: ["OWASP LLM03 Supply Chain", "OWASP-ASI04:2026", "NIST SA-10", "CWE-1395"]

  # --- Fleet-level flows (2026): three architecture-level crossings the system
  # --- model sees and a per-server linter cannot. Fixture: examples/agent-fleet-flows/.

  - id: ATL-214
    title: Untrusted input can be written into agent long-term memory (memory poisoning)
    severity: high
    target: model
    match: { model_taint_flow: { sources: ["network", "saas_data"], sinks: ["memory"] } }
    description: The fleet pairs a server that ingests untrusted external content (web/fetch or SaaS data) with a persistent memory / vector store, so attacker-controlled text can be written into long-term memory and steer the agent on future, unrelated sessions - memory poisoning that outlives the run it entered on. The source and sink servers are named in the finding.
    recommendation: Treat retrieved external content as untrusted and never persist it verbatim - attribute and validate every memory write to a trusted source, or keep the untrusted-input tool and the memory store in separate agent sessions.
    frameworks: ["OWASP-ASI06:2026", "OWASP LLM01 Prompt Injection", "MITRE ATLAS AML.T0070", "Agentic-SoK 2026 R3"]

  - id: ATL-215
    title: Sampling-capable server shares a runtime with autonomous tool execution
    severity: high
    target: model
    match: { model_sampling_covert_invocation: true }
    description: A server that declares the MCP sampling capability can issue server-initiated model completions (Unit 42, MCP sampling attack vectors, 2025 - covert tool invocation, conversation hijacking, resource theft), and it shares the runtime with an autonomy surface (an auto-approved tool or a shell), so a server-driven completion can reach tools with no human checkpoint. The sampling declaration and the autonomy grant sit on different servers, so only the assembled model shows the pairing.
    recommendation: Isolate sampling-capable servers from autonomous execution - keep every sampling request behind user review, and never pair a sampling-capable server with auto-approval or a shell-capable tool in the same session.
    frameworks: ["OWASP-ASI02:2026", "OWASP-MCP MCP06:2025", "MITRE ATLAS AML.T0051", "Unit 42 MCP Sampling 2025"]

  - id: ATL-216
    title: Indirect prompt injection can reach cloud credentials
    severity: high
    target: model
    match: { model_injection_reaches_cloud: true }
    description: An untrusted-input tool (web/fetch, SaaS data, or memory the agent reads back) and a cloud-credentialed tool server share one agent, so an indirect prompt injection in the content the agent ingests can drive cloud APIs with those credentials - agent-to-cloud reachability across a trust boundary that no per-component check can see. Unlike ATL-209 this needs no public endpoint, so it covers the common internal case; the source and cloud servers are named in the finding.
    recommendation: Do not co-locate an untrusted-input tool with a broadly-credentialed cloud tool in one session - put cloud access behind a scoped broker with short-lived, per-task credentials, or split the untrusted-input and cloud tools into separate agents.
    frameworks: ["OWASP-ASI02:2026", "OWASP-ASI03:2026", "OWASP LLM01 Prompt Injection", "NIST AC-4"]

  - id: ATL-217
    title: Information-flow lattice violation across the tool fleet
    severity: high
    target: model
    match: { model_ifc_violation: true }
    description: The same flow ATL-202/207 flag heuristically, stated as a formal information-flow property. With confidentiality and integrity labels on each tool surface, a high-confidentiality source reaches a low-confidentiality egress sink (data can leave the boundary), or a low-integrity source reaches a trust-critical sink (untrusted input can drive an action), with no declassifier or endorser on the path. The named label path makes the finding defensible and citable (FIDES / CaMeL) rather than a severity with an opinion.
    recommendation: Interpose a declassifier (validation, allowlist, or human approval) between the labelled source and sink so the flow is broken, or split the source and sink capabilities into separate agent sessions so no single context spans the lattice violation.
    frameworks: ["OWASP-ASI02:2026", "OWASP-ASI03:2026", "OWASP LLM01 Prompt Injection", "NIST AC-4", "NIST SC-7"]
